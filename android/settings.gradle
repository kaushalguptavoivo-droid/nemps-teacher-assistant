pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file('local.properties').withInputStream { properties.load(it) }
        def path = properties.getProperty('flutter.sdk')
        assert path != null, 'flutter.sdk not set in android/local.properties'
        return path
    }()
    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
    repositories { google(); mavenCentral(); gradlePluginPortal() }
}
plugins { id 'dev.flutter.flutter-plugin-loader' version '1.0.0' }
dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
rootProject.name = 'nemps_teacher_assistant'
include ':app'
