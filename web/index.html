<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="NEMPS Teacher Assistant — New Era Modern Public School, Vrindavan.">
  <meta name="theme-color" content="#315ca8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- PWA / iOS home-screen support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NEMPS">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <title>NEMPS Teacher Assistant</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* PWA Install Banner */
    #pwa-install-banner {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #1e40af, #3b82f6);
      color: white;
      padding: 16px 24px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      display: none;
      align-items: center;
      gap: 16px;
      z-index: 99999;
      font-family: 'Segoe UI', system-ui, sans-serif;
      animation: slideUp 0.3s ease;
      max-width: 90vw;
    }

    @keyframes slideUp {
      from { transform: translateX(-50%) translateY(100px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }

    #pwa-install-banner.show { display: flex; }

    #pwa-install-banner .icon {
      font-size: 32px;
    }

    #pwa-install-banner .content {
      flex: 1;
    }

    #pwa-install-banner .title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 2px;
    }

    #pwa-install-banner .subtitle {
      font-size: 12px;
      opacity: 0.8;
    }

    #pwa-install-banner .install-btn {
      background: #fbbf24;
      color: #1e293b;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
    }

    #pwa-install-banner .close-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
    }

    #pwa-install-banner .close-btn:hover {
      background: rgba(255,255,255,0.3);
    }

    /* Loading screen */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1e40af, #3b82f6);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99998;
    }

    .loading-screen .logo {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .loading-screen h1 {
      color: white;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 28px;
      margin-bottom: 8px;
    }

    .loading-screen p {
      color: rgba(255,255,255,0.7);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-top: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div class="loading-screen" id="loading-screen">
    <div class="logo">🏫</div>
    <h1>NEMPS</h1>
    <p>Teacher Assistant</p>
    <div class="loading-spinner"></div>
  </div>

  <!-- PWA Install Banner -->
  <div id="pwa-install-banner">
    <div class="icon">📱</div>
    <div class="content">
      <div class="title">Install NEMPS App</div>
      <div class="subtitle">Add to desktop for quick access</div>
    </div>
    <button class="install-btn" id="pwa-install-btn">Install</button>
    <button class="close-btn" id="pwa-close-btn">×</button>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    // PWA Install Prompt Handler
    let deferredPrompt;
    const banner = document.getElementById('pwa-install-banner');
    const installBtn = document.getElementById('pwa-install-btn');
    const closeBtn = document.getElementById('pwa-close-btn');
    const loadingScreen = document.getElementById('loading-screen');

    // Hide loading screen when Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      setTimeout(() => {
        if (loadingScreen) loadingScreen.style.display = 'none';
      }, 500);
    });

    // Capture install prompt
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      
      // Show install banner after 3 seconds
      setTimeout(() => {
        if (banner && !localStorage.getItem('pwa-install-dismissed')) {
          banner.classList.add('show');
        }
      }, 3000);
    });

    // Install button click
    if (installBtn) {
      installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          deferredPrompt = null;
          banner.classList.remove('show');
          if (outcome === 'accepted') {
            localStorage.setItem('pwa-installed', 'true');
          }
        }
      });
    }

    // Close button click
    if (closeBtn) {
      closeBtn.addEventListener('click', () => {
        banner.classList.remove('show');
        localStorage.setItem('pwa-install-dismissed', 'true');
      });
    }

    // Hide banner when installed
    window.addEventListener('appinstalled', () => {
      banner.classList.remove('show');
      localStorage.setItem('pwa-installed', 'true');
    });

    // Desktop back button handling
    window.addEventListener('popstate', function(e) {
      // Handle browser back button on desktop PWA
      if (window.history.state && window.history.state.navigationId) {
        // Let Flutter handle the navigation
      }
    });

    // Prevent accidental navigation away
    window.addEventListener('beforeunload', function(e) {
      // Only warn if there's unsaved data
      // e.preventDefault();
      // e.returnValue = '';
    });
  </script>
</body>
</html>
