name: nemps_teacher_assistant
description: "NEMPS Teacher Assistant - A school-specific teacher productivity app for New Era Modern Public School, Vrindavan."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management & DI
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  riverpod_generator: ^2.3.0

  # Navigation
  go_router: ^12.0.0

  # Supabase
  supabase_flutter: ^1.10.0
  supabase: ^1.10.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  encrypt: ^4.0.1

  # HTTP & Networking
  dio: ^5.3.1

  # Date & Time
  intl: ^0.19.0

  # File Handling
  file_picker: ^6.0.0
  excel: ^2.1.1
  csv: ^6.0.0
  path_provider: ^2.1.1

  # URL Launcher
  url_launcher: ^6.2.0

  # Image & Assets
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4

  # Logging & Analytics
  logger: ^2.0.0

  # Animations
  animations: ^2.0.7

  # Connectivity
  connectivity_plus: ^5.0.0

  # Device Info
  device_info_plus: ^9.1.0

  # Permission Handling
  permission_handler: ^11.4.3

  # JSON Serialization
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1

  # Equatable for value equality
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  
  # Code Generation
  build_runner: ^2.4.6
  freezed: ^2.4.1
  json_serializable: ^6.7.0
  hive_generator: ^2.0.0
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/logos/
    - assets/animations/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Italic.ttf
          style: italic
