name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build release APK
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=https://fdvfmoxcbkdisgnhplaa.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=sb_publishable_2G6kz4aS1GPHOJU0MeNtrg_j2psSWoS

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NEMPS-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
